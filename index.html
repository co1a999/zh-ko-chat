<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>韓中聊天室</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e12;
      --surface: #16161c;
      --surface2: #1e1e27;
      --border: #2a2a38;
      --accent: #c8a96e;
      --accent2: #7e9fd4;
      --text: #e8e4dc;
      --text-muted: #7a7a8e;
      --zh-color: #c8a96e;
      --ko-color: #7e9fd4;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', 'Noto Sans KR', sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 560px;
      min-height: 100svh;
      max-height: 780px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-title { display: flex; align-items: center; gap: 10px; }

    .lang-tags { display: flex; gap: 6px; }

    .lang-tag {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    .lang-tag.zh {
      background: rgba(200,169,110,0.15);
      color: var(--zh-color);
      border: 1px solid rgba(200,169,110,0.3);
    }

    .lang-tag.ko {
      background: rgba(126,159,212,0.15);
      color: var(--ko-color);
      border: 1px solid rgba(126,159,212,0.3);
    }

    .title-text { font-size: 15px; font-weight: 500; letter-spacing: 0.03em; }

    #status {
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 5px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }

    #status.ok .status-dot { background: #6fcf97; }
    #status.error .status-dot { background: #eb5757; animation: pulse 1s infinite; }
    #status.ok .status-label { color: #6fcf97; }
    #status.error .status-label { color: #eb5757; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 5px;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      max-width: 90%;
    }

    .msg-original { font-size: 15px; color: var(--text); line-height: 1.5; }
    .msg-divider { height: 1px; background: var(--border); margin: 8px 0; }
    .msg-translated { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

    .msg-lang {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 20px;
      align-self: flex-start;
    }

    .msg-lang.zh { background: rgba(200,169,110,0.1); color: var(--zh-color); }
    .msg-lang.ko { background: rgba(126,159,212,0.1); color: var(--ko-color); }

    .msg img {
      max-width: 220px;
      border-radius: 10px;
      display: block;
      border: 1px solid var(--border);
    }

    .msg-error .msg-bubble {
      border-color: rgba(235,87,87,0.3);
      background: rgba(235,87,87,0.07);
    }

    .msg-error .msg-original { color: #eb5757; font-size: 13px; }

    footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .input-row { display: flex; gap: 8px; align-items: center; }

    #text {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    #text:focus { border-color: var(--accent); }
    #text::placeholder { color: var(--text-muted); }

    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      width: 42px; height: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    .send-btn:hover { opacity: 0.85; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 18px; height: 18px; fill: #0e0e12; }

    .file-row { display: flex; align-items: center; gap: 10px; }

    .file-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px 10px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      transition: border-color 0.2s, color 0.2s;
    }

    .file-label:hover { border-color: var(--accent); color: var(--accent); }
    .file-label svg { width: 14px; height: 14px; }

    #imageInput { display: none; }

    #file-name {
      font-size: 11px;
      color: var(--text-muted);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .clear-file {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 0 4px;
      display: none;
    }

    .clear-file:hover { color: #eb5757; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-title">
      <div class="lang-tags">
        <span class="lang-tag zh">繁中</span>
        <span class="lang-tag ko">한국어</span>
      </div>
      <span class="title-text">即時翻譯聊天</span>
    </div>
    <div id="status">
      <div class="status-dot"></div>
      <span class="status-label">連線中...</span>
    </div>
  </header>

  <div id="chat">
    <div class="empty-state" id="empty">
      <span style="font-size:32px;opacity:0.4">💬</span>
      <span>傳送訊息開始聊天</span>
      <span style="font-size:11px">繁體中文 ↔ 한국어 即時翻譯</span>
    </div>
  </div>

  <footer>
    <div class="file-row">
      <label class="file-label" for="imageInput">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        上傳圖片
      </label>
      <input type="file" id="imageInput" accept="image/*">
      <span id="file-name"></span>
      <button class="clear-file" id="clearFile" onclick="clearFile()">✕</button>
    </div>
    <div class="input-row">
      <input id="text" placeholder="輸入繁體中文或韓文..." autocomplete="off"/>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </footer>
</div>

<script>
  let socket;
  let reconnectAttempts = 0;
  // 自動對應目前頁面的 host，http→ws、https→wss
  const WS_URL = (location.protocol === "https:" ? "wss://" : "ws://") + location.host;

  function setStatus(msg, cls) {
    const el = document.getElementById("status");
    el.querySelector(".status-label").textContent = msg;
    el.className = cls || "";
  }

  function connect() {
    socket = new WebSocket(WS_URL);

    socket.onopen = () => {
      setStatus("已連線", "ok");
      reconnectAttempts = 0;
    };

    socket.onclose = () => {
      const timeout = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
      reconnectAttempts++;
      setStatus(`${timeout / 1000}s 後重新連線...`, "error");
      setTimeout(connect, timeout);
    };

    socket.onerror = () => socket.close();

    socket.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === "error") { appendError(msg.message); return; }
      if (msg.type === "history") {
        msg.messages.forEach(m => {
          if (m.type === "text") renderMessage({ type: "text", original: m.original, translated: m.translated, lang: m.lang });
          if (m.type === "image") renderMessage({ type: "image", imageUrl: m.image_url });
        });
        return;
      }
      renderMessage(msg);
    };
  }

  function appendError(text) {
    const div = document.createElement("div");
    div.className = "msg msg-error";
    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    const p = document.createElement("div");
    p.className = "msg-original";
    p.textContent = "⚠ " + text;
    bubble.appendChild(p);
    div.appendChild(bubble);
    appendMsg(div);
  }

  function renderMessage(msg) {
    hideEmpty();
    const div = document.createElement("div");
    div.className = "msg";

    if (msg.type === "image") {
      const bubble = document.createElement("div");
      bubble.className = "msg-bubble";
      const img = document.createElement("img");
      img.src = msg.imageUrl;
      img.alt = "圖片";
      bubble.appendChild(img);
      div.appendChild(bubble);
    } else {
      const langClass = msg.lang === "ko" ? "ko" : "zh";
      const langLabel = msg.lang === "ko" ? "한국어" : "繁中";

      const tag = document.createElement("span");
      tag.className = `msg-lang ${langClass}`;
      tag.textContent = langLabel;

      const bubble = document.createElement("div");
      bubble.className = "msg-bubble";

      const original = document.createElement("div");
      original.className = "msg-original";
      original.textContent = msg.original;

      const divider = document.createElement("div");
      divider.className = "msg-divider";

      const translated = document.createElement("div");
      translated.className = "msg-translated";
      translated.textContent = msg.translated;

      // 朗讀按鈕
      const speakRow = document.createElement('div');
      speakRow.style.cssText = 'display:flex;gap:8px;margin-top:8px;';

      const btnOrig = document.createElement('button');
      btnOrig.textContent = '🔊 🇹🇼';
      btnOrig.style.cssText = 'background:none;border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--text-muted);cursor:pointer;';
      btnOrig.onclick = () => playText(msg.original, msg.lang === "ko" ? "ko-KR" : "zh-TW");

      const btnTrans = document.createElement('button');
      btnTrans.textContent = '🔊 🇰🇷';
      btnTrans.style.cssText = 'background:none;border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--text-muted);cursor:pointer;';
      btnTrans.onclick = () => playText(msg.translated, msg.lang === "ko" ? "zh-TW" : "ko-KR");

      speakRow.appendChild(btnOrig);
      speakRow.appendChild(btnTrans);

      bubble.appendChild(original);
      bubble.appendChild(divider);
      bubble.appendChild(translated);
      bubble.appendChild(speakRow);
      div.appendChild(tag);
      div.appendChild(bubble);
    }

    appendMsg(div);
  }

  function appendMsg(el) {
    const chat = document.getElementById("chat");
    chat.appendChild(el);
    chat.scrollTop = chat.scrollHeight;
  }

  function hideEmpty() {
    const empty = document.getElementById("empty");
    if (empty) empty.remove();
  }

  async function sendMessage() {
    if (!socket || socket.readyState !== WebSocket.OPEN) {
      appendError("尚未連線，請稍候");
      return;
    }

    const file = document.getElementById("imageInput").files[0];
    if (file) {
      const formData = new FormData();
      formData.append("image", file);
      try {
        const res = await fetch("/upload", { method: "POST", body: formData });
        const { url } = await res.json();
        socket.send(JSON.stringify({ type: "image", imageUrl: url }));
        clearFile();
      } catch {
        appendError("圖片上傳失敗");
      }
      return;
    }

    const text = document.getElementById("text").value.trim();
    if (!text) return;
    socket.send(JSON.stringify({ type: "text", text }));
    document.getElementById("text").value = "";
  }

  function clearFile() {
    document.getElementById("imageInput").value = "";
    document.getElementById("file-name").textContent = "";
    document.getElementById("clearFile").style.display = "none";
  }

  document.getElementById("imageInput").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (file) {
      document.getElementById("file-name").textContent = file.name;
      document.getElementById("clearFile").style.display = "inline";
    }
  });

  document.getElementById("text").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  connect();

  // 手機鍵盤彈出時自動調整版面
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      document.body.style.height = window.visualViewport.height + 'px';
      const chat = document.getElementById('chat');
      chat.scrollTop = chat.scrollHeight;
    });
  }

  // 輸入框 focus 時自動捲動到可視區域
  const inputElement = document.getElementById('text');
  inputElement.addEventListener('focus', () => {
    setTimeout(() => {
      inputElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
  });

  // 朗讀文字
  function playText(text, lang) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = lang;
    window.speechSynthesis.speak(utterance);
  }
</script>
</body>
</html>
